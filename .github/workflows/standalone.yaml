name: standalone

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::desc

      - name: Check standalone changelog
        run: Rscript tools/standalone/check-news.R

      - name: Generate and test standalone
        run: Rscript tools/standalone/test-local.R --out-dir standalone-build

      - name: Publish standalone branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf standalone-publish
          mkdir standalone-publish
          cp -R standalone-build/. standalone-publish/
          cd standalone-publish
          git init -b standalone
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update standalone schema bundle"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin standalone
